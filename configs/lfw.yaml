trainer:
  name: LFWTrainer
  num_epochs: 300

dataset:
  name: LFWLoader
  root: data
  batch_size: 16
  num_workers: 8

transform:
  name: LFWTransform

model:
  name: deeplabv3_resnet50
  num_classes: 3
  pretrained: False # not support now

optimizer:
  name: SGD
  lr: 0.5e-3
  momentum: 0.9
  weight_decay: 1.e-5

scheduler:
  name: StepLR
  step_size: 100
  gamma: 0.1

log_params:
  batch_size: $dataset.batch_size
  model_name: $model.name
  learning_rate: $optimizer.lr
