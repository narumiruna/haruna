trainer:
  name: ImageRegressionTrainer
  num_epochs: 300

transform:
  name: AFLW2000Transform

dataset:
  name: AFLW2000Loader
  root: data
  batch_size: 32
  num_workers: 8

model:
  name: efficientnet_b0
  num_classes: 136

optimizer:
  name: TFRMSprop
  lr: 0.0125
  weight_decay: 0
  rho: 0.9
  eps: 1.e-3
  momentum: 0.9
  warmup: 315

scheduler:
  name: ExponentialLR
  gamma: 0.98
